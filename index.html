<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin Art Game</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #111;
    color: white;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  canvas {
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 30px #000;
    cursor: crosshair;
  }

  .controls {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  button, input {
    font-size: 16px;
    padding: 8px;
  }

  button {
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="art" width="600" height="600"></canvas>

<div class="controls">
  <label>
    Color:
    <input type="color" id="color" value="#ff0055">
  </label>
  <label>
    Brush:
    <input type="range" id="size" min="2" max="30" value="8">
  </label>
  <button id="spin">Spin</button>
  <button id="stop">Stop</button>
  <button id="clear">Clear</button>
  <button id="save">Save</button>
</div>

<script>
const canvas = document.getElementById("art");
const ctx = canvas.getContext("2d");

const color = document.getElementById("color");
const size = document.getElementById("size");

const cx = canvas.width / 2;
const cy = canvas.height / 2;
const radius = canvas.width / 2;

let drawing = false;
let angle = 0;
let speed = 0.08;
let spinning = false;
let points = [];

function clearCanvas() {
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  points = [];
}

clearCanvas();

function drawDot(x, y, a) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(a);

  ctx.beginPath();
  ctx.arc(x - cx, y - cy, size.value / 2, 0, Math.PI * 2);
  ctx.fillStyle = color.value;
  ctx.globalAlpha = 0.8;
  ctx.fill();

  ctx.restore();
}

canvas.addEventListener("mousedown", e => {
  drawing = true;
  addPoint(e);
});

canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mouseleave", () => drawing = false);

canvas.addEventListener("mousemove", e => {
  if (drawing) addPoint(e);
});

function addPoint(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const dx = x - cx;
  const dy = y - cy;

  if (Math.sqrt(dx*dx + dy*dy) < radius) {
    points.push({x, y});
    drawDot(x, y, angle);
  }
}

function animate() {
  if (spinning) {
    angle += speed;

    clearCanvas();

    points.forEach(p => {
      for (let i = 0; i < 12; i++) {
        drawDot(
          p.x,
          p.y,
          angle + (Math.PI * 2 / 12) * i
        );
      }
    });
  }

  requestAnimationFrame(animate);
}

animate();

document.getElementById("spin").onclick = () => {
  spinning = true;
};

document.getElementById("stop").onclick = () => {
  spinning = false;
};

document.getElementById("clear").onclick = clearCanvas;

document.getElementById("save").onclick = () => {
  const link = document.createElement("a");
  link.download = "spin-art.png";
  link.href = canvas.toDataURL();
  link.click();
};
</script>

</body>
</html>
