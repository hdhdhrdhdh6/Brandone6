<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Art</title>
<style>
body {
  margin:0;
  background:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
  font-family:sans-serif;
}

canvas {
  width:90vw;
  height:90vw;
  max-width:600px;
  max-height:600px;
  background:white;
  border-radius:50%;
  touch-action:none;
}

.controls {
  margin-top:10px;
}

button, input {
  font-size:18px;
  margin:3px;
}
</style>
</head>

<body>

<canvas id="art" width="600" height="600"></canvas>

<div class="controls">
<input type="color" id="color" value="#ff0066">
<input type="range" id="brush" min="5" max="50" value="15">
<button onclick="startSpin()">Spin</button>
<button onclick="stopSpin()">Stop</button>
<button onclick="wipe()">Clear</button>
</div>

<script>
var canvas=document.getElementById("art");
var ctx=canvas.getContext("2d");

var paint=document.createElement("canvas");
paint.width=600;
paint.height=600;
var pctx=paint.getContext("2d");

pctx.fillStyle="white";
pctx.fillRect(0,0,600,600);

var spinning=false;
var rotation=0;
var down=false;

function getPos(e){
  var r=canvas.getBoundingClientRect();
  return {
    x:(e.touches[0].clientX-r.left)*600/r.width,
    y:(e.touches[0].clientY-r.top)*600/r.height
  };
}

function dot(x,y){
  var size=document.getElementById("brush").value;
  var col=document.getElementById("color").value;

  pctx.fillStyle=col;

  for(var i=0;i<12;i++){
    var a=i*Math.PI*2/12;
    var dx=x-300;
    var dy=y-300;

    var nx=300+dx*Math.cos(a)-dy*Math.sin(a);
    var ny=300+dx*Math.sin(a)+dy*Math.cos(a);

    pctx.beginPath();
    pctx.arc(nx,ny,size/2,0,Math.PI*2);
    pctx.fill();
  }

  redraw();
}

function redraw(){
  ctx.clearRect(0,0,600,600);
  ctx.save();
  ctx.translate(300,300);
  ctx.rotate(rotation);
  ctx.drawImage(paint,-300,-300);
  ctx.restore();
}

canvas.addEventListener("touchstart",function(e){
  e.preventDefault();
  down=true;
  dot(getPos(e).x,getPos(e).y);
},{passive:false});

canvas.addEventListener("touchmove",function(e){
  e.preventDefault();
  if(down){
    dot(getPos(e).x,getPos(e).y);
  }
},{passive:false});

canvas.addEventListener("touchend",function(){
  down=false;
});

function startSpin(){
  spinning=true;
}

function stopSpin(){
  spinning=false;
}

function wipe(){
  pctx.fillStyle="white";
  pctx.fillRect(0,0,600,600);
  redraw();
}

function animate(){
  if(spinning){
    rotation+=0.04;
    redraw();
  }
  requestAnimationFrame(animate);
}

redraw();
animate();
</script>

</body>
</html>
