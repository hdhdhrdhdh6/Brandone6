<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin Art</title>
<style>
body {
  margin: 0;
  background: #222;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

canvas {
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 25px black;
  touch-action: none;
}

.controls {
  margin-top: 15px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
</style>
</head>

<body>

<canvas id="canvas" width="600" height="600"></canvas>

<div class="controls">
  <input type="color" id="color" value="#ff0066">
  <input type="range" id="brush" min="2" max="40" value="10">
  <button id="spin">Spin</button>
  <button id="stop">Stop</button>
  <button id="clear">Clear</button>
  <button id="save">Save</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const color = document.getElementById("color");
const brush = document.getElementById("brush");

let drawing = false;
let rotation = 0;
let spinning = false;

const center = canvas.width / 2;

let art = document.createElement("canvas");
art.width = canvas.width;
art.height = canvas.height;
let artCtx = art.getContext("2d");

function clear() {
  artCtx.fillStyle = "white";
  artCtx.fillRect(0,0,art.width,art.height);
  redraw();
}

function redraw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(center, center);
  ctx.rotate(rotation);
  ctx.drawImage(art, -center, -center);
  ctx.restore();
}

function draw(x,y) {
  artCtx.beginPath();
  artCtx.arc(x,y,brush.value/2,0,Math.PI*2);
  artCtx.fillStyle=color.value;
  artCtx.fill();

  // mirrored spin-art effect
  for(let i=1;i<12;i++){
    let a=(Math.PI*2/12)*i;
    let dx=x-center;
    let dy=y-center;

    let nx=center + dx*Math.cos(a)-dy*Math.sin(a);
    let ny=center + dx*Math.sin(a)+dy*Math.cos(a);

    artCtx.beginPath();
    artCtx.arc(nx,ny,brush.value/2,0,Math.PI*2);
    artCtx.fill();
  }

  redraw();
}

function pointer(e) {
  const r=canvas.getBoundingClientRect();
  return {
    x:e.clientX-r.left,
    y:e.clientY-r.top
  };
}

canvas.addEventListener("pointerdown", e=>{
  drawing=true;
  let p=pointer(e);
  draw(p.x,p.y);
});

canvas.addEventListener("pointermove", e=>{
  if(!drawing) return;
  let p=pointer(e);
  draw(p.x,p.y);
});

window.addEventListener("pointerup",()=>{
  drawing=false;
});

document.getElementById("spin").onclick=()=>{
  spinning=true;
};

document.getElementById("stop").onclick=()=>{
  spinning=false;
};

document.getElementById("clear").onclick=()=>{
  clear();
};

document.getElementById("save").onclick=()=>{
  let link=document.createElement("a");
  link.download="spin-art.png";
  link.href=art.toDataURL();
  link.click();
};

function loop(){
  if(spinning){
    rotation += 0.03;
    redraw();
  }
  requestAnimationFrame(loop);
}

clear();
loop();
</script>

</body>
</html>
